<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axiom Engine (Godot Style)</title>
</head>

<body>
  <div id="godot-layout">
    <!-- Top Bar -->
    <header id="top-bar">
      <div class="top-menu">
        <span class="menu-item" style="font-weight:bold; margin-right:8px;">Axiom</span>
        <span class="menu-item">Scene</span>
        <span class="menu-item">Project</span>
        <span class="menu-item">Debug</span>
        <span class="menu-item">Editor</span>
        <span class="menu-item">Help</span>
      </div>
      <div class="top-workspaces">
        <div id="tab-2d" class="workspace-tab">2D</div>
        <div id="tab-3d" class="workspace-tab active">3D</div>
        <div id="tab-script" class="workspace-tab">Script</div>
        <div id="tab-game" class="workspace-tab">Game</div>
        <div id="tab-assetlib" class="workspace-tab">AssetLib</div>
      </div>
      <div class="top-controls">
        <button class="icon-btn play-btn" title="Play"><i data-lucide="play" style="width:16px;height:16px;fill:currentColor;"></i></button>
        <button class="icon-btn" title="Pause"><i data-lucide="pause" style="width:16px;height:16px;fill:currentColor;"></i></button>
        <button class="icon-btn" title="Stop"><i data-lucide="square" style="width:14px;height:14px;fill:currentColor;"></i></button>
      </div>
    </header>

    <div id="main-content">
      <aside id="left-sidebar" class="sidebar">
        <!-- Scene Panel -->
        <div class="panel" id="scene-panel" style="flex:1; min-height:100px;">
          <div class="explorer-header" style="display:flex; align-items:center; gap:8px; padding: 12px 14px; font-weight: 600; font-size: 13px; color: #e8eaed; border-bottom: 1px solid #3c4043;">
            <i data-lucide="boxes" style="width:16px; height:16px; color:#9aa0a6;"></i> 
            <span>Scene Explorer</span>
          </div>
          <div class="toolbar panel-toolbar" style="padding: 6px 14px; border-bottom: 1px solid #3c4043; height: auto;">
            <button id="btn-add-node" class="icon-btn" title="Add Node" style="color:#dcdcdc"><i data-lucide="plus" style="width:16px;height:16px;"></i></button>
            <button class="icon-btn"><i data-lucide="link" style="width:16px;height:16px;"></i></button>
            <div class="spacer"></div>
            <div class="filter-box" style="margin-right:0;">
              <span class="filter-icon"><i data-lucide="search" style="width:14px;height:14px;"></i></span>
              <input type="text" id="scene-filter-input" placeholder="Filter..." class="filter-input" style="width:100px" />
            </div>
          </div>
          <div id="scene-tree" class="tree-view"></div>
        </div>

        <div class="v-resizer" id="resizer-left-v"></div>

        <!-- FileSystem Panel -->
        <div class="panel bottom-panel-sidebar" id="filesystem-panel" style="flex:1; min-height:100px;">
          <div class="tabs">
            <div class="tab active">FileSystem</div>
          </div>
          <div class="toolbar panel-toolbar">
            <button id="btn-upload-asset" class="icon-btn" title="Add Asset"><i data-lucide="folder-plus" style="width:16px;height:16px;"></i></button>
            <div class="spacer"></div>
            <div class="filter-box" style="width: 120px;">
              <span class="filter-icon"><i data-lucide="search" style="width:14px;height:14px;"></i></span>
              <input type="text" placeholder="Filter..." class="filter-input" id="fs-filter" />
            </div>
          </div>
          <div id="filesystem-tree" class="tree-view">
            <!-- Assets rendered here -->
          </div>
          <input type="file" id="asset-upload-input" style="display:none" multiple>
        </div>
      </aside>
      <div class="resizer" id="resizer-left"></div>


      <!-- Center Area -->
      <main id="center-area">
        <div id="viewport-panel" class="panel flex-grow">
          <div class="viewport-toolbar toolbar">
            <div class="toolbar-group tab-group">
              <span class="tab-like active">main<span class="close-tab">×</span></span>
            </div>
            <div class="toolbar-group center-tools">
              <button class="icon-btn" id="tool-select" title="Select Mode (Q)">↖</button>
              <button class="icon-btn active" id="tool-move" title="Move (W)">✥</button>
              <button class="icon-btn" id="tool-rotate" title="Rotate (E)">↻</button>
              <button class="icon-btn" id="tool-scale" title="Scale (R)">⤡</button>
              <button class="text-btn" id="tool-collision" title="Toggle Collider">Add Mesh Collider</button>
              <div class="divider"></div>
              <button class="text-btn">Transform</button>
              <div class="dropdown">
                <button class="text-btn dropbtn" id="btn-view-menu">View ▾</button>
                <div class="dropdown-content" id="view-dropdown-menu">
                  <div class="dropdown-submenu">
                    <label id="toggle-view-gizmos-lbl"><input type="checkbox" id="toggle-view-gizmos" checked> Show
                      Gizmos <span style="margin-left:auto; font-size:10px;">▶</span></label>
                    <div class="dropdown-submenu-content">
                      <label><input type="checkbox" id="toggle-gizmos-cam" checked> Cameras</label>
                      <label><input type="checkbox" id="toggle-gizmos-light" checked> Lights</label>
                    </div>
                  </div>
                  <label><input type="checkbox" id="toggle-view-colliders"> Show Colliders</label>
                </div>
              </div>
            </div>
            <div class="toolbar-group right-tools" style="margin-left:auto; padding-right:8px;">
              <button class="icon-btn" id="btn-debug-layer" title="Toggle Debug Layer">⠇</button>
              <div class="dropdown" id="viewport-settings-dropdown">
                <button class="icon-btn dropbtn" id="btn-viewport-settings" title="Viewport Settings">⋯</button>
                <div class="dropdown-content" id="viewport-settings-panel" style="min-width:200px; right:0; left:auto;">
                  <div
                    style="padding:6px 12px; font-size:11px; font-weight:600; color:var(--g-text-dim); border-bottom:1px solid var(--g-border); margin-bottom:4px;">
                    Viewport Settings</div>
                  <div style="padding:4px 12px;">
                    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:2px;">
                      <label style="font-size:12px;">Zoom Speed</label><span id="zoom-speed-val"
                        style="font-size:11px; color:var(--g-text-dim);">1.0×</span></div>
                    <input type="range" id="zoom-speed-slider" min="0.1" max="5" step="0.1" value="1"
                      style="width:100%; margin-bottom:8px;">
                    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:2px;">
                      <label style="font-size:12px;">Pan Speed</label><span id="pan-speed-val"
                        style="font-size:11px; color:var(--g-text-dim);">1.0×</span></div>
                    <input type="range" id="pan-speed-slider" min="0.1" max="5" step="0.1" value="1"
                      style="width:100%;">
                  </div>
                  <div style="padding:4px 12px 8px; border-top:1px solid var(--g-border); margin-top:4px;">
                    <button id="btn-reset-nav"
                      style="all:unset; cursor:pointer; font-size:11px; color:var(--g-accent); padding:2px 0;">↺ Reset
                      to Auto</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="viewport-wrapper">
            <canvas id="renderCanvas"></canvas>
            <div class="viewport-label">Perspective</div>
          </div>
        </div>

        <div id="script-panel" class="panel flex-grow hidden">
          <!-- CodeMirror 6 will live here -->
        </div>
      </main>
      <div class="resizer" id="resizer-right"></div>


      <!-- Right Sidebar -->
      <aside id="right-sidebar" class="sidebar">
        <div class="panel flex-grow">
          <div class="tabs">
            <div class="tab active">Inspector</div>
            <div class="tab">Node</div>
            <div class="tab">History</div>
          </div>
          <div class="toolbar panel-toolbar justify-between">
            <div class="history-nav">
              <button class="icon-btn"><i data-lucide="chevron-left" style="width:16px;height:16px;"></i></button>
              <button class="icon-btn"><i data-lucide="chevron-right" style="width:16px;height:16px;"></i></button>
            </div>
            <button class="icon-btn" title="Object settings"><i data-lucide="settings" style="width:16px;height:16px;"></i></button>
          </div>
          <div id="inspector-content" class="property-view">
            <!-- properties auto generated -->
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- Add Node Dialog -->
  <div id="add-node-dialog" class="dialog-overlay hidden">
    <div class="dialog">
      <div class="dialog-header">Create New Node <button id="btn-close-dialog" class="close-btn"><i data-lucide="x" style="width:16px;height:16px;"></i></button></div>
      <div class="dialog-content">
        <input type="text" class="filter-input search-node-input" placeholder="Search..." />
        <div class="node-list">
          <div class="node-item selected" data-type="Mesh" data-mesh="Cube"><i data-lucide="box" style="width:15px;height:15px;color:#8ab4f8;"></i> Cube</div>
          <div class="node-item" data-type="Mesh" data-mesh="Sphere"><i data-lucide="circle" style="width:15px;height:15px;color:#8ab4f8;"></i> Sphere</div>
          <div class="node-item" data-type="Mesh" data-mesh="Cylinder"><i data-lucide="cylinder" style="width:15px;height:15px;color:#8ab4f8;"></i> Cylinder</div>
          <div class="node-item" data-type="Mesh" data-mesh="Plane"><i data-lucide="square" style="width:15px;height:15px;color:#8ab4f8;"></i> Plane</div>
          <div class="node-item" data-type="Mesh" data-mesh="Torus"><i data-lucide="circle-dashed" style="width:15px;height:15px;color:#8ab4f8;"></i> Torus</div>
          <div class="node-item" data-type="Mesh" data-mesh="Capsule"><i data-lucide="pill" style="width:15px;height:15px;color:#8ab4f8;"></i> Capsule</div>
          <div class="node-item" data-type="Mesh" data-mesh="Cone"><i data-lucide="triangle" style="width:15px;height:15px;color:#8ab4f8;"></i> Cone</div>
          <div class="node-item" data-type="Mesh" data-mesh="Disc"><i data-lucide="disc" style="width:15px;height:15px;color:#8ab4f8;"></i> Disc</div>
          <div class="node-item" data-type="Light" data-light="Directional"><i data-lucide="sun" style="width:15px;height:15px;color:#fceba6;"></i> Directional Light</div>
          <div class="node-item" data-type="Light" data-light="Point"><i data-lucide="lightbulb" style="width:15px;height:15px;color:#fceba6;"></i> Point Light</div>
          <div class="node-item" data-type="Light" data-light="Spot"><i data-lucide="flashlight" style="width:15px;height:15px;color:#fceba6;"></i> Spot Light</div>
          <div class="node-item" data-type="Light" data-light="Hemispheric"><i data-lucide="globe" style="width:15px;height:15px;color:#fceba6;"></i> Hemispheric Light</div>
          <div class="node-item" data-type="Camera"><i data-lucide="camera" style="width:15px;height:15px;color:#8ab4f8;"></i> Camera</div>
          <div class="node-item" data-type="Node_Empty"><i data-lucide="crosshair" style="width:15px;height:15px;color:#9aa0a6;"></i> Node</div>
        </div>
      </div>
      <div class="dialog-footer">
        <button id="btn-dialog-create" class="btn-primary">Create</button>
        <button id="btn-dialog-cancel" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
