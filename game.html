<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Runtime - Axiom Engine</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0b0e14; }
        #canvas { width: 100%; height: 100%; outline: none; display: block; }
        #loading { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center;
            background: #0b0e14; color: #70b5ff; font-family: 'Segoe UI', system-ui, sans-serif; 
            font-size: 18px; letter-spacing: 1px; flex-direction: column; gap: 15px; z-index: 100;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(112, 181, 255, 0.1);
            border-top-color: #70b5ff; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <span>INITIALIZING GAME ENGINE...</span>
    </div>
    <canvas id="canvas"></canvas>
    <script type="module" src="/src/game_main.ts"></script>
</body>
</html>
